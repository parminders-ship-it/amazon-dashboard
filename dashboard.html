<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Ads Multi-Brand Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #1F4E78;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .last-updated {
            color: #999;
            font-size: 12px;
            font-style: italic;
        }
        
        .brand-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .brand-tab {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px 20px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            color: #666;
        }
        
        .brand-tab.active {
            background: #1F4E78;
            border-color: #1F4E78;
            color: white;
            box-shadow: 0 4px 12px rgba(31, 78, 120, 0.3);
        }
        
        .brand-tab:hover {
            border-color: #1F4E78;
        }
        
        .dashboard {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .metric-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .metric-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            border-left: 4px solid #1F4E78;
        }
        
        .metric-label {
            color: #999;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .metric-value {
            font-size: 28px;
            font-weight: bold;
            color: #1F4E78;
            margin-bottom: 8px;
        }
        
        .metric-change {
            font-size: 14px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
        }
        
        .metric-change.positive {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .metric-change.negative {
            background: #ffebee;
            color: #c62828;
        }
        
        .section-title {
            color: #1F4E78;
            font-size: 18px;
            font-weight: 600;
            margin-top: 30px;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }
        
        .alert-box {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .alert-box.critical {
            background: #ffebee;
            border-left-color: #f44336;
        }
        
        .alert-content strong {
            color: #666;
        }
        
        .alert-count {
            background: rgba(0,0,0,0.1);
            color: #333;
            padding: 8px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
        }
        
        .recommendation {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 10px;
            color: #1b5e20;
            font-size: 14px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1F4E78;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: #ffebee;
            border: 1px solid #f44336;
            border-radius: 8px;
            padding: 20px;
            color: #c62828;
            margin-bottom: 20px;
        }
        
        .footer {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 24px; }
            .metric-grid { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
            .dashboard { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Amazon Ads Multi-Brand Dashboard</h1>
            <p class="subtitle">Real-time performance analysis across all brands</p>
            <p class="last-updated">Last updated: <span id="lastUpdate">Loading...</span></p>
        </header>
        
        <div class="brand-tabs" id="brandTabs"></div>
        
        <div class="dashboard" id="dashboard">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading dashboard data...</p>
            </div>
        </div>
    </div>

    <script>
        // ===== CONFIGURATION (EDIT THESE) =====
        const SHEET_ID = 'YOUR_GOOGLE_SHEET_ID_HERE';
        const SHEET_RANGE = 'A:T';  // Adjust if your data range is different
        // ======================================
        
        let allBrandData = {};
        let currentBrand = null;
        
        // Initialize dashboard
        async function initDashboard() {
            try {
                await fetchGoogleSheetData();
                renderBrandTabs();
                if (Object.keys(allBrandData).length > 0) {
                    currentBrand = Object.keys(allBrandData)[0];
                    renderDashboard();
                }
            } catch (error) {
                showError('Failed to load dashboard: ' + error.message);
            }
        }
        
        // Fetch data from Google Sheets
        async function fetchGoogleSheetData() {
            try {
                // Using Google Sheets CSV export URL
                const csvUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;
                const response = await fetch(csvUrl);
                
                if (!response.ok) throw new Error('Failed to fetch sheet');
                
                const csv = await response.text();
                parseSheetData(csv);
                
                document.getElementById('lastUpdate').textContent = 
                    new Date().toLocaleString();
                    
            } catch (error) {
                throw new Error('Could not retrieve data. Ensure Sheet ID is correct and sheet is published.');
            }
        }
        
        // Parse CSV data
        function parseSheetData(csv) {
            const lines = csv.split('\n');
            let currentBrand = null;
            let headers = null;
            
            lines.forEach((line, index) => {
                if (!line.trim()) return;
                
                const cells = line.split(',').map(cell => cell.trim().replace(/"/g, ''));
                
                // Detect brand sheets (typically first column is brand name in row 2)
                if (index < 5 && cells[0] && cells[0].length > 0) {
                    const possibleBrand = cells[0];
                    if (possibleBrand !== 'ASIN' && !possibleBrand.includes('Instructions')) {
                        currentBrand = possibleBrand;
                    }
                }
                
                // Headers
                if (index === 4 || (cells[0] === 'ASIN')) {
                    headers = cells;
                    return;
                }
                
                // Data rows
                if (headers && cells[0] && currentBrand) {
                    if (!allBrandData[currentBrand]) {
                        allBrandData[currentBrand] = {
                            name: currentBrand,
                            skus: []
                        };
                    }
                    
                    const sku = {
                        asin: cells[0],
                        category: cells[1],
                        baseSales: parseFloat(cells[2]) || 0,
                        compareSales: parseFloat(cells[3]) || 0,
                        baseSpend: parseFloat(cells[5]) || 0,
                        compareSpend: parseFloat(cells[6]) || 0,
                        baseTacos: parseFloat(cells[8]) || 0,
                        compareTacos: parseFloat(cells[9]) || 0,
                        baseAcos: parseFloat(cells[11]) || 0,
                        compareAcos: parseFloat(cells[12]) || 0,
                        baseRoas: parseFloat(cells[14]) || 0,
                        compareRoas: parseFloat(cells[15]) || 0,
                        baseOrders: parseFloat(cells[17]) || 0,
                        compareOrders: parseFloat(cells[18]) || 0
                    };
                    
                    allBrandData[currentBrand].skus.push(sku);
                }
            });
            
            // Calculate aggregates for each brand
            Object.keys(allBrandData).forEach(brandName => {
                const skus = allBrandData[brandName].skus;
                calculateBrandMetrics(allBrandData[brandName], skus);
            });
        }
        
        // Calculate brand-level metrics
        function calculateBrandMetrics(brand, skus) {
            brand.totalBaseSales = skus.reduce((sum, sku) => sum + sku.baseSales, 0);
            brand.totalCompareSales = skus.reduce((sum, sku) => sum + sku.compareSales, 0);
            brand.totalBaseSpend = skus.reduce((sum, sku) => sum + sku.baseSpend, 0);
            brand.totalCompareSpend = skus.reduce((sum, sku) => sum + sku.compareSpend, 0);
            
            const tacosValues = skus
                .filter(sku => sku.baseTacos > 0 || sku.compareTacos > 0)
                .map(sku => [sku.baseTacos, sku.compareTacos])
                .flat();
            brand.avgTacos = tacosValues.length > 0 ? 
                tacosValues.reduce((a,b) => a+b) / tacosValues.length : 0;
            
            const acosValues = skus
                .filter(sku => sku.baseAcos > 0 || sku.compareAcos > 0)
                .map(sku => [sku.baseAcos, sku.compareAcos])
                .flat();
            brand.avgAcos = acosValues.length > 0 ? 
                acosValues.reduce((a,b) => a+b) / acosValues.length : 0;
            
            const roasValues = skus
                .filter(sku => sku.baseRoas > 0 || sku.compareRoas > 0)
                .map(sku => [sku.baseRoas, sku.compareRoas])
                .flat();
            brand.avgRoas = roasValues.length > 0 ? 
                roasValues.reduce((a,b) => a+b) / roasValues.length : 0;
            
            brand.totalBaseOrders = skus.reduce((sum, sku) => sum + sku.baseOrders, 0);
            brand.totalCompareOrders = skus.reduce((sum, sku) => sum + sku.compareOrders, 0);
            
            // Calculate changes
            brand.salesChange = brand.totalBaseSales > 0 ? 
                ((brand.totalCompareSales - brand.totalBaseSales) / brand.totalBaseSales * 100) : 0;
            brand.spendChange = brand.totalBaseSpend > 0 ? 
                ((brand.totalCompareSpend - brand.totalBaseSpend) / brand.totalBaseSpend * 100) : 0;
            brand.ordersChange = brand.totalBaseOrders > 0 ? 
                ((brand.totalCompareOrders - brand.totalBaseOrders) / brand.totalBaseOrders * 100) : 0;
            
            // Count alerts
            brand.highTacosCount = skus.filter(sku => Math.abs(sku.compareTacos - sku.baseTacos) > 20).length;
            brand.salesDropCount = skus.filter(sku => sku.baseSales > 50 && sku.compareSales < sku.baseSales * 0.7).length;
            brand.highAcosCount = skus.filter(sku => Math.abs(sku.compareAcos - sku.baseAcos) > 50).length;
        }
        
        // Render brand tabs
        function renderBrandTabs() {
            const container = document.getElementById('brandTabs');
            container.innerHTML = '';
            
            Object.keys(allBrandData).forEach(brandName => {
                const tab = document.createElement('div');
                tab.className = 'brand-tab' + (brandName === currentBrand ? ' active' : '');
                tab.textContent = allBrandData[brandName].name;
                tab.onclick = () => {
                    currentBrand = brandName;
                    renderBrandTabs();
                    renderDashboard();
                };
                container.appendChild(tab);
            });
        }
        
        // Render main dashboard
        function renderDashboard() {
            if (!currentBrand || !allBrandData[currentBrand]) return;
            
            const brand = allBrandData[currentBrand];
            const dashboard = document.getElementById('dashboard');
            
            const salesChangeClass = brand.salesChange > 0 ? 'positive' : 'negative';
            const tacosStatus = brand.avgTacos > 8 ? 'CRITICAL' : 'OK';
            const tacosClass = brand.avgTacos > 8 ? 'negative' : 'positive';
            
            dashboard.innerHTML = `
                <div class="metric-grid">
                    <div class="metric-card">
                        <div class="metric-label">Total Sales</div>
                        <div class="metric-value">$${Math.round(brand.totalCompareSales).toLocaleString()}</div>
                        <div class="metric-change ${salesChangeClass}">
                            ${brand.salesChange > 0 ? '+' : ''}${brand.salesChange.toFixed(1)}%
                        </div>
                    </div>
                    
                    <div class="metric-card">
                        <div class="metric-label">Ad Spend</div>
                        <div class="metric-value">$${Math.round(brand.totalCompareSpend).toLocaleString()}</div>
                        <div class="metric-change ${brand.spendChange > 0 ? 'negative' : 'positive'}">
                            ${brand.spendChange > 0 ? '+' : ''}${brand.spendChange.toFixed(1)}%
                        </div>
                    </div>
                    
                    <div class="metric-card">
                        <div class="metric-label">TACOS</div>
                        <div class="metric-value">${brand.avgTacos.toFixed(2)}%</div>
                        <div class="metric-change ${tacosClass}">
                            ${tacosStatus}
                        </div>
                    </div>
                    
                    <div class="metric-card">
                        <div class="metric-label">Orders</div>
                        <div class="metric-value">${Math.round(brand.totalCompareOrders)}</div>
                        <div class="metric-change ${brand.ordersChange > 0 ? 'positive' : 'negative'}">
                            ${brand.ordersChange > 0 ? '+' : ''}${brand.ordersChange.toFixed(1)}%
                        </div>
                    </div>
                </div>
                
                <div class="section-title">⚠️ Critical Alerts</div>
                ${brand.highTacosCount > 0 ? `
                    <div class="alert-box critical">
                        <div class="alert-content">
                            <strong>High TACOS (>20% increase)</strong>
                            <p>Review keyword performance and audit campaigns</p>
                        </div>
                        <div class="alert-count">${brand.highTacosCount}</div>
                    </div>
                ` : ''}
                
                ${brand.salesDropCount > 0 ? `
                    <div class="alert-box">
                        <div class="alert-content">
                            <strong>Sales Drop (>30%)</strong>
                            <p>Investigate visibility, reviews, and pricing</p>
                        </div>
                        <div class="alert-count">${brand.salesDropCount}</div>
                    </div>
                ` : ''}
                
                ${brand.highAcosCount > 0 ? `
                    <div class="alert-box">
                        <div class="alert-content">
                            <strong>High ACOS (>50% increase)</strong>
                            <p>Test bid reductions and pause low-performing keywords</p>
                        </div>
                        <div class="alert-count">${brand.highAcosCount}</div>
                    </div>
                ` : ''}
                
                ${brand.highTacosCount === 0 && brand.salesDropCount === 0 && brand.highAcosCount === 0 ? `
                    <div class="alert-box" style="background: #e8f5e9; border-left-color: #4caf50;">
                        <div class="alert-content" style="color: #1b5e20;">
                            <strong>✓ All metrics healthy</strong>
                            <p>No critical alerts this week</p>
                        </div>
                    </div>
                ` : ''}
                
                <div class="section-title">📋 Recommended Actions</div>
                <div class="recommendation">✓ Review TACOS and ACOS metrics daily</div>
                <div class="recommendation">✓ Test bid adjustments on underperforming keywords</div>
                <div class="recommendation">✓ Scale campaigns with ROAS >4x</div>
                <div class="recommendation">✓ Investigate sales drops and address root causes</div>
            `;
        }
        
        // Show error message
        function showError(message) {
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = `<div class="error">
                <strong>Error:</strong> ${message}
                <p style="margin-top: 10px; font-size: 12px;">
                    Make sure to:<br>
                    1. Replace SHEET_ID with your Google Sheet ID<br>
                    2. Publish your Google Sheet to the web (File → Publish to Web)<br>
                    3. Wait a few seconds for data to load
                </p>
            </div>`;
        }
        
        // Auto-refresh every 5 minutes
        setInterval(() => {
            console.log('Auto-refreshing dashboard...');
            fetchGoogleSheetData();
            if (currentBrand) renderDashboard();
        }, 5 * 60 * 1000);
        
        // Initialize on page load
        window.addEventListener('load', initDashboard);
    </script>
</body>
</html>
